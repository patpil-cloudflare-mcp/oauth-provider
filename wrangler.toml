name = "oauth-provider"
main = "src/index.ts"
compatibility_date = "2024-11-20"
compatibility_flags = ["nodejs_compat"]

# Static Assets Configuration
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Custom Domains - Modern approach (replaces manual AAAA 100:: DNS records)
# Cloudflare automatically creates and manages DNS records and certificates

# OAuth 2.1 Configuration
[vars]
OAUTH_BASE_URL = "https://panel.wtyczki.ai"
# Free MCP server registry: JSON map { "<server-name>": <daily-limit-per-user> }
# Keys are Worker names (X-MCP-Server header), NOT project dir names.
# Add an entry here to enable a free server's /oauth/userinfo-free integration.
# Fleet default 20/day (2026-05-29). Servers not listed → 403 → server fails open (no limit).
FREE_SERVERS = '{"ads-roi":20,"nbp-rates":20,"openskyapp":20,"mood-energy-log":20,"persona-empatia":20,"pomodoro":20,"quiz":20,"saas-navigator":20,"sales-audit":20,"sprawdz-posla":20,"carbon-auditor":20,"terminy-leczenia":20,"storyone":20,"mcp-shop":20}'

# Custom Domain — auth panel only
[[routes]]
pattern = "panel.wtyczki.ai"
custom_domain = true

[[d1_databases]]
binding = "TOKEN_DB"
database_name = "mcp-oauth"
database_id = "eac93639-d58e-4777-82e9-f1e28113d5b2"

[[kv_namespaces]]
binding = "USER_SESSIONS"
id = "e5ad189139cd44f38ba0224c3d596c73"
preview_id = "49c43fb4d6e242db87fd885ba46b5a1d"

# Service Binding to mcp-token-system (billing API)
[[services]]
binding = "BILLING_API"
service = "mcp-token-system"

# Durable Object: per-(user × free server) daily usage counter with lazy
# reset at Warsaw midnight. One DO instance per `${userId}:${serverName}`.
[[durable_objects.bindings]]
name = "FREE_USAGE_LIMITER"
class_name = "FreeUsageLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FreeUsageLimiter"]

# Rate Limiting Bindings (Workers Rate Limiting, GA Sep 2025)
[[ratelimits]]
name = "RATE_LIMIT_SEND_CODE"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_VERIFY_CODE"
namespace_id = "1002"

  [ratelimits.simple]
  limit = 10
  period = 60
